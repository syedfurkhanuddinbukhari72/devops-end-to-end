
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 500px;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            color: #2563eb;
            margin-bottom: 10px;
            font-size: 40px;
        }

        h2 {
            color: #16a34a;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            padding: 6px 0;
            font-size: 18px;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🚀 Warehouse Dashboard</h1>

    <h2>Version 2</h2>

    <p><strong>Successfully deployed using:</strong></p>

    <ul>
        <li>Terraform</li>
        <li>Ansible</li>
        <li>Docker</li>
        <li>Docker Hub</li>
        <li>GitHub Actions</li>
        <li>AWS EC2</li>
        <li>Nginx</li>
    </ul>

</div>

</body>
</html>
