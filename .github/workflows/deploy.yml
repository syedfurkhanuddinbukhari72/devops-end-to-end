name: Deploy Portfolio

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ===============================
      # LEVEL 2 - STEP 1
      # Configure AWS CLI
      # ===============================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ===============================
      # LEVEL 2 - STEP 1
      # Check EC2 Availability
      # ===============================
      - name: Check EC2 Availability
        id: ec2-check
        run: |
          echo "Checking for running EC2..."

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=devops-server" \
                      "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_ID" ]; then
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "❌ No running EC2 found."
          else
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
            echo "✅ Running EC2 Found: $INSTANCE_ID"
          fi

      - name: Setup Terraform
        if: steps.ec2-check.outputs.exists == 'false'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        if: steps.ec2-check.outputs.exists == 'false'
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        if: steps.ec2-check.outputs.exists == 'false'
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        if: steps.ec2-check.outputs.exists == 'false'
        working-directory: terraform
        run: terraform plan

      - name: Terraform Apply
        if: steps.ec2-check.outputs.exists == 'false'
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get Terraform Outputs
        if: steps.ec2-check.outputs.exists == 'false'
        id: terraform-output
        working-directory: terraform
        run: |
          echo "public_ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT
          echo "instance_id=$(terraform output -raw instance_id)" >> $GITHUB_OUTPUT

      - name: Determine Deployment Host
        id: deploy-host
        run: |
          if [ "${{ steps.ec2-check.outputs.exists }}" = "true" ]; then
            echo "host=${{ secrets.EC2_HOST }}" >> $GITHUB_OUTPUT
          else
            echo "host=${{ steps.terraform-output.outputs.public_ip }}" >> $GITHUB_OUTPUT
          fi

      - name: Wait for SSH to be ready
        run: |
          echo "Waiting for SSH to be ready on ${{ steps.deploy-host.outputs.host }}..."
          for i in {1..30}; do
            nc -z -w 5 ${{ steps.deploy-host.outputs.host }} 22 && echo "SSH is ready!" && break
            echo "SSH not ready yet, retrying in 5 seconds..."
            sleep 5
          done

      - name: Generate Ansible Inventory
        run: |
          echo "[web]" > ansible/inventory.ini
          echo "${{ steps.deploy-host.outputs.host }}" >> ansible/inventory.ini
          echo "" >> ansible/inventory.ini
          echo "[web:vars]" >> ansible/inventory.ini
          echo "ansible_user=${{ secrets.EC2_USERNAME }}" >> ansible/inventory.ini
          echo "ansible_ssh_private_key_file=private_key.pem" >> ansible/inventory.ini

      - name: Run Ansible Playbook
        working-directory: ansible
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ansible-playbook -i inventory.ini site.yml

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t syedfurkhan1234/portfolio:latest ./app

      - name: Push Docker Image
        run: |
          docker push syedfurkhan1234/portfolio:latest

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ steps.deploy-host.outputs.host }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "app/docker-compose.yml"
          target: "/tmp"

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ steps.deploy-host.outputs.host }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /opt/portfolio

            sudo mv /tmp/app/docker-compose.yml /opt/portfolio/docker-compose.yml

            cd /opt/portfolio

            docker compose pull

            docker compose up -d --force-recreate

            docker image prune -f

      - name: Health Check
        run: |
          echo "Performing health check on http://${{ steps.deploy-host.outputs.host }}:8080..."
          for i in {1..10}; do
            if curl -sf http://${{ steps.deploy-host.outputs.host }}:8080 > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Waiting for app to start, retrying in 5 seconds..."
            sleep 5
          done
          echo "❌ Health check failed!"
          exit 1

      - name: Rollback Deployment
        if: failure()
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ steps.deploy-host.outputs.host }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/portfolio
            echo "⚠️ Health check failed! Rolling back/stopping container..."
            docker compose down

      - name: Deployment Summary
        if: success()
        run: |
          INSTANCE_ID="${{ steps.ec2-check.outputs.exists == 'true' && steps.ec2-check.outputs.instance_id || steps.terraform-output.outputs.instance_id }}"
          HOST_IP="${{ steps.deploy-host.outputs.host }}"
          
          echo "========================================="
          echo "🚀 DEPLOYMENT SUMMARY"
          echo "========================================="
          echo "EC2 Instance ID : $INSTANCE_ID"
          echo "Public IP       : $HOST_IP"
          echo "Docker Status   : Running"
          echo "Deployment      : SUCCESS"
          echo "========================================="
          
          # Write to GITHUB_STEP_SUMMARY for a nice UI presentation
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **EC2 Instance ID** | \`$INSTANCE_ID\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Public IP** | \`$HOST_IP\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Status** | ✅ Running |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployment Status** | 🎉 SUCCESS |" >> $GITHUB_STEP_SUMMARY